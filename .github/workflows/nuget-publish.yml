name: publish

on:
  release:
    types: [published]
  workflow_dispatch:

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
  DOTNET_NOLOGO: true
  NuGetDirectory: nuget-package/

defaults:
  run:
    shell: pwsh

jobs:
  resolve-version:
    runs-on: ubuntu-latest
    outputs:
      package-version: ${{ steps.version.outputs.package-version }}
      assembly-version: ${{ steps.version.outputs.assembly-version }}
    steps:
      - uses: actions/checkout@v4
      - name: Resolve version
        id: version
        run: |
          if ("${{ github.event_name }}" -eq "release") {
            $tag = "${{ github.event.release.tag_name }}" -replace '^v', ''

            # Validate tag format: must be major.minor.patch with optional prerelease suffix
            if ($tag -notmatch '^\d+\.\d+\.\d+(-[a-zA-Z0-9\.\-]+)?$') {
              Write-Error "Invalid tag format '${{ github.event.release.tag_name }}'. Expected vX.Y.Z or vX.Y.Z-prerelease."
              exit 1
            }

            # PackageVersion keeps prerelease suffix (e.g. 1.7.0-beta.1)
            "package-version=$tag" >> $env:GITHUB_OUTPUT

            # AssemblyVersion/FileVersion must be numeric only (e.g. 1.7.0.0)
            $numeric = ($tag -replace '-.*', '') + ".0"
            "assembly-version=$numeric" >> $env:GITHUB_OUTPUT
          } else {
            # workflow_dispatch fallback: read version from Directory.Build.props
            [xml]$props = Get-Content "src/Directory.Build.props"
            $ver = $props.Project.PropertyGroup.Version
            "package-version=$ver" >> $env:GITHUB_OUTPUT
            "assembly-version=$ver" >> $env:GITHUB_OUTPUT
          }
      - name: Print resolved version
        run: |
          Write-Host "Package version  = ${{ steps.version.outputs.package-version }}"
          Write-Host "Assembly version = ${{ steps.version.outputs.assembly-version }}"

  test:
    needs: [resolve-version]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
      - name: Restore dependencies
        run: dotnet restore TALXIS.CLI.sln
      - name: Build
        run: dotnet build TALXIS.CLI.sln --configuration Release --no-restore
      - name: Install template package for integration tests
        run: dotnet new install TALXIS.DevKit.Templates.Dataverse
      - name: Run tests (including integration tests)
        run: dotnet test TALXIS.CLI.sln --configuration Release --no-build --logger "trx;LogFileName=test_results.trx"

  create_nuget:
    needs: [test, resolve-version]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
      - name: Assemble cumulative release notes
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Fetch all published releases (newest first) and build a plain-text changelog
          # that nuget.org renders nicely in the "Release Notes" tab.
          $releases = gh release list --limit 100 --json tagName,name --template '{{range .}}{{.tagName}}{{"\n"}}{{end}}'
          $changelog = ""
          foreach ($tag in ($releases -split "`n" | Where-Object { $_ -ne "" })) {
            $version = $tag -replace '^v', ''
            $body = gh release view $tag --json body --template '{{.body}}'

            # Strip markdown formatting to plain text for nuget.org
            $plain = $body `
              -replace '#{1,6}\s*', '' `
              -replace '\*{1,2}([^*]+)\*{1,2}', '$1' `
              -replace '`([^`]+)`', '$1' `
              -replace '\[([^\]]+)\]\([^\)]+\)', '$1' `
              -replace '```[\s\S]*?```', '' `
              -replace '\r\n', "`n" `
              -replace '\r', "`n"

            # Indent each non-empty line
            $indented = ($plain -split "`n" | ForEach-Object {
              if ($_.Trim() -ne "") { "  $_" } else { "" }
            }) -join "`n"

            $changelog += "${version}:`n${indented}`n`n"
          }

          Set-Content -Path "release-notes.txt" -Value $changelog -Encoding UTF8
          Write-Host "--- Release notes preview (first 500 chars) ---"
          Write-Host ($changelog.Substring(0, [Math]::Min(500, $changelog.Length)))
      - name: Write release notes targets file
        if: github.event_name == 'release'
        run: |
          # Write a .targets file that MSBuild auto-imports from the src/ directory.
          # Using Directory.Build.targets ensures it runs after all other property
          # evaluation, so PackageReleaseNotes is set reliably.
          $notes = Get-Content "release-notes.txt" -Raw -Encoding UTF8
          $escaped = [System.Security.SecurityElement]::Escape($notes)
          $targetsContent = @"
          <Project>
            <PropertyGroup>
              <PackageReleaseNotes>$escaped</PackageReleaseNotes>
            </PropertyGroup>
          </Project>
          "@
          Set-Content -Path "src/Directory.Build.targets" -Value $targetsContent -Encoding UTF8
      - name: Create NuGet package
        run: |
          $pkgVer = "${{ needs.resolve-version.outputs.package-version }}"
          $asmVer = "${{ needs.resolve-version.outputs.assembly-version }}"
          dotnet pack src/TALXIS.CLI/TALXIS.CLI.csproj --configuration Release -p:Version=$pkgVer -p:PackageVersion=$pkgVer -p:AssemblyVersion=$asmVer -p:FileVersion=$asmVer
          dotnet pack src/TALXIS.CLI.MCP/TALXIS.CLI.MCP.csproj --configuration Release -p:Version=$pkgVer -p:PackageVersion=$pkgVer -p:AssemblyVersion=$asmVer -p:FileVersion=$asmVer
      - uses: actions/upload-artifact@v4
        with:
          name: nuget
          if-no-files-found: error
          retention-days: 7
          path: |
            src/TALXIS.CLI/bin/Release/*.nupkg
            src/TALXIS.CLI.MCP/bin/Release/*.nupkg

  deploy:
    needs: [create_nuget, resolve-version]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: nuget
          path: ${{ env.NuGetDirectory }}
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
      - name: Publish NuGet package
        run: |
          foreach($file in (Get-ChildItem "${{ env.NuGetDirectory }}" -Recurse -Include *.nupkg)) {
              dotnet nuget push $file --api-key "${{ secrets.NUGET_APIKEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate
          }
  update-version:
    needs: [deploy, resolve-version]
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Validate release tag is reachable from master
        run: |
          $tagName = "${{ github.event.release.tag_name }}"
          git fetch origin master --tags
          $tagCommit = git rev-list -n 1 "refs/tags/$tagName"
          if (-not $tagCommit) {
            Write-Error "Release tag '$tagName' could not be resolved to a commit."
            exit 1
          }
          # Verify the tag commit is an ancestor of (or equal to) master HEAD.
          # This allows commits to land on master after the tag without blocking
          # the version bump, while still preventing releases from non-master branches.
          $isAncestor = git merge-base --is-ancestor $tagCommit HEAD
          if ($LASTEXITCODE -ne 0) {
            Write-Error "Release tag '$tagName' (commit '$tagCommit') is not reachable from master. Refusing to bump version."
            exit 1
          }
      - name: Update Directory.Build.props
        run: |
          $ver = "${{ needs.resolve-version.outputs.package-version }}"
          $file = "src/Directory.Build.props"
          $content = Get-Content $file -Raw
          $content = $content -replace '<Version>[^<]+</Version>', "<Version>$ver</Version>"
          $content = $content -replace '<AssemblyVersion>[^<]+</AssemblyVersion>', "<AssemblyVersion>$ver</AssemblyVersion>"
          $content = $content -replace '<FileVersion>[^<]+</FileVersion>', "<FileVersion>$ver</FileVersion>"
          $content = $content -replace '<PackageVersion>[^<]+</PackageVersion>', "<PackageVersion>$ver</PackageVersion>"
          Set-Content $file $content
      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/Directory.Build.props
          git diff --cached --quiet && exit 0
          git commit -m "chore: bump version to ${{ needs.resolve-version.outputs.package-version }}"
          git push
